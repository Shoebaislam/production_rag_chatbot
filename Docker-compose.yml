version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant-rag
    ports:
      - "6333:6333"

  redis:
    image: redis
    container_name: redis-rag
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis